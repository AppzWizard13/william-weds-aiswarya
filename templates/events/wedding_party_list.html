{% extends 'advadmin/index.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'mob-custom/theme.css' %}">

<div class="content-wrapper">
  <div class="container-xxl flex-grow-1 container-p-y">
    <div class="md-header">
      <div class="d-flex justify-content-between">
        <div>
          <h1>Wedding Party</h1>
          <p>Manage bridesmaids, groomsmen, and more</p>
        </div>
        <a href="{% url 'events:wedding_party_create' %}" class="md-filled-button">Add Member</a>
      </div>
    </div>

    <div class="md-card">
      <div class="table-responsive">
        <table class="table md-table">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Name</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for party in wedding_party %}
            <tr>
              <td>
                <img src="{% if party.image %}{{ party.image.url }}{% else %}{% static 'icons/default-avatar.png' %}{% endif %}" 
                     class="rounded-circle" style="width: 50px; height: 50px; object-fit: cover;">
              </td>
              <td><strong>{{ party.name }}</strong></td>
              <td>
                <span class="badge bg-primary px-3 py-2">{{ party.role }}</span>
              </td>
              <td>
                <a href="{% url 'events:wedding_party_update' party.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
              </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center py-8"><a href="{% url 'events:wedding_party_create' %}" class="md-filled-button">Add First Member</a></td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
