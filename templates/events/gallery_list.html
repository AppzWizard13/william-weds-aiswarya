{% extends 'advadmin/index.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'mob-custom/theme.css' %}">

<div class="content-wrapper">
  <div class="container-xxl flex-grow-1 container-p-y">
    <div class="md-header">
      <h1>Photo Gallery ({{ gallery_images|length }})</h1>
      <a href="{% url 'events:gallery_create' %}" class="md-filled-button">Add Photo</a>
    </div>

    <div class="row g-4">
      {% for image in gallery_images %}
      <div class="col-md-4 col-lg-3">
        <div class="md-card h-100 position-relative overflow-hidden rounded-3 shadow-lg">
          <img src="{{ image.image.url }}" class="w-100" style="height: 250px; object-fit: cover;">
          <div class="p-4">
            <h6 class="fw-bold mb-1">{{ image.title }}</h6>
            <p class="text-muted small mb-3">{{ image.description|truncatechars:50 }}</p>
            <a href="{% url 'events:gallery_update' image.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
          </div>
        </div>
      </div>
      {% empty %}
      <div class="col-12 text-center py-8">
        <i class="bx bx-image fs-1 text-muted mb-4"></i>
        <h5>No photos yet</h5>
        <a href="{% url 'events:gallery_create' %}" class="md-filled-button mt-3">Add First Photo</a>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
