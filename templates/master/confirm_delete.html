{% extends 'advadmin/index.html' %}
{% load static %}

{% block content %}
 <link rel="stylesheet" href="{% static 'mob-custom/theme.css' %}"> 

<div class="content-wrapper d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="container-xxl">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="md-card p-5 text-center shadow-lg">
          <div class="mb-4">
            <div class="rounded-circle bg-label-warning d-flex align-items-center justify-content-center mx-auto" style="width: 80px; height: 80px;">
              <i class="bx bx-error-alt text-warning" style="font-size: 40px;"></i>
            </div>
          </div>
          <h2 class="fw-bold mb-3">Archive Item?</h2>
          <p class="text-muted mb-5">Are you sure you want to deactivate <strong>{{ object }}</strong>? This will hide it from the customer storefront.</p>
          
          <form method="POST">
            {% csrf_token %}
            <div class="d-grid gap-3">
              <button type="submit" class="md-filled-button bg-warning border-0 py-3">
                Yes, Deactivate
              </button>
              <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-light rounded-pill py-3">
                Go Back
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
