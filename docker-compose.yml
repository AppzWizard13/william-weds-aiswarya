# version: '3.9'

services:
  web:
    build: .
    container_name: myoceanbasket_web
    entrypoint: ["/app/entrypoint.sh"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=myoceanbasket.settings.development

  db:
    image: postgres:14
    container_name: myoceanbasket_db
    environment:
      POSTGRES_DB: myoceanbasket_db
      POSTGRES_USER: myoceanbasket_admin
      POSTGRES_PASSWORD: xPL7y6qe1gLHAg2B9SWvW06vXSC8lxSe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: myoceanbasket_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  postgres_data:
